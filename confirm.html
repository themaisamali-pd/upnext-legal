<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Confirm your email — upnext?</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: #1E0E26;
      color: #FFFFFF;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 16px;
      line-height: 1.7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      max-width: 440px;
      width: 100%;
      text-align: center;
    }
    .logo {
      font-size: 28px;
      font-weight: 700;
      color: #FFD750;
      letter-spacing: -0.5px;
      margin-bottom: 40px;
    }
    .icon {
      width: 72px;
      height: 72px;
      background: rgba(255, 215, 80, 0.12);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
    }
    .icon svg {
      width: 32px;
      height: 32px;
    }
    h1 {
      font-size: 24px;
      font-weight: 700;
      color: #FFFFFF;
      margin-bottom: 12px;
      line-height: 1.3;
    }
    p {
      color: rgba(255, 255, 255, 0.65);
      font-size: 15px;
      margin-bottom: 36px;
      line-height: 1.6;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 16px 24px;
      background-color: #FFD750;
      color: #1E0E26;
      font-size: 16px;
      font-weight: 700;
      text-align: center;
      text-decoration: none;
      border-radius: 16px;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.88; }
    .error {
      display: none;
      background: rgba(255, 89, 89, 0.12);
      border: 1px solid rgba(255, 89, 89, 0.3);
      border-radius: 12px;
      padding: 16px;
      color: #FF8080;
      font-size: 14px;
      margin-bottom: 24px;
    }
    .note {
      margin-top: 20px;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.35);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">upnext?</div>

    <div class="icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#FFD750" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 6L9 17l-5-5"/>
      </svg>
    </div>

    <h1>Confirm your email</h1>
    <p>Tap the button below to verify your email address and open upnext?.</p>

    <div class="error" id="error">
      This link is invalid or has already been used. Request a new confirmation email from the app.
    </div>

    <a href="#" class="btn" id="openBtn">Open in upnext?</a>

    <p class="note">If the app doesn't open, make sure upnext? is installed on this device.</p>
  </div>

  <script>
    (function () {
      var params = {};
      window.location.search.slice(1).split("&").forEach(function (pair) {
        var parts = pair.split("=");
        if (parts.length === 2) params[decodeURIComponent(parts[0])] = decodeURIComponent(parts[1]);
      });

      var tokenHash = params["token_hash"];
      var type = params["type"] || "signup";
      var btn = document.getElementById("openBtn");
      var err = document.getElementById("error");

      if (!tokenHash) {
        err.style.display = "block";
        btn.style.display = "none";
        return;
      }

      var deepLink = "upnext://confirm-email?token_hash=" + encodeURIComponent(tokenHash) + "&type=" + encodeURIComponent(type);
      btn.href = deepLink;
    })();
  </script>
</body>
</html>
